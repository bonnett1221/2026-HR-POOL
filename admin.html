<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Commissioner Admin</title><link rel="stylesheet" href="/styles.css"></head><body><div class="wrap"><div class="hero"><div><div class="title">Commissioner Admin</div><div class="sub">Edit teams, assign hitters, and force a stats refresh.</div></div></div><div class="card top-space"><div class="btn-row"><button id="saveBtn" class="btn">Save League</button><button id="refreshBtn" class="btn secondary">Refresh Stats Now</button></div><div id="msg" class="sub top-space"></div></div><div id="adminRoot" class="admin-grid top-space"></div></div><script>
const params=new URLSearchParams(location.search);const key=params.get('key')||'';const root=document.getElementById('adminRoot');const msg=document.getElementById('msg');let league=null;
async function load(){const r=await fetch('/api/admin/league?key='+encodeURIComponent(key));if(!r.ok){msg.textContent='Wrong commissioner link.';return;}league=await r.json();render();}
function render(){root.innerHTML=''; league.teams.forEach((team,ti)=>{const box=document.createElement('div');box.className='team-admin';box.innerHTML=`<div class="row2" style="grid-template-columns:1fr"><input value="${team.name}" data-team="${ti}" data-field="name" placeholder="Team name"></div><div class="top-space">${team.players.map((p,pi)=>`<div class="row2"><input value="${p.name||''}" data-team="${ti}" data-player="${pi}" data-field="name" placeholder="Player name"><input value="${p.id||''}" data-team="${ti}" data-player="${pi}" data-field="id" placeholder="Player ID"><button type="button" class="btn secondary" data-search-team="${ti}" data-search-player="${pi}">Search</button></div><div id="search-${ti}-${pi}"></div>`).join('')}</div>`;root.appendChild(box);});root.querySelectorAll('input').forEach(inp=>inp.addEventListener('input',e=>{const t=e.target.dataset.team;const field=e.target.dataset.field;const p=e.target.dataset.player;if(p!=null){league.teams[t].players[p][field]=e.target.value}else{league.teams[t][field]=e.target.value}}));root.querySelectorAll('button[data-search-team]').forEach(btn=>btn.addEventListener('click',()=>doSearch(btn.dataset.searchTeam,btn.dataset.searchPlayer)))}
async function doSearch(ti,pi){const q=league.teams[ti].players[pi].name; if(!q)return; const r=await fetch('/api/search?q='+encodeURIComponent(q)); const results=await r.json(); const host=document.getElementById(`search-${ti}-${pi}`); host.className='search-results'; host.innerHTML=results.map(p=>`<div class="search-item" data-ti="${ti}" data-pi="${pi}" data-id="${p.id}" data-name="${p.name}">${p.name} ${p.team?`— ${p.team}`:''}</div>`).join('') || '<div class="search-item">No results</div>'; host.querySelectorAll('.search-item[data-id]').forEach(item=>item.addEventListener('click',()=>{league.teams[ti].players[pi].id=item.dataset.id; league.teams[ti].players[pi].name=item.dataset.name; render();}))}
async function save(){const r=await fetch('/api/admin/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key,poolName:league.poolName,teams:league.teams})});msg.textContent=r.ok?'League saved.':'Save failed.'}
async function refreshNow(){const r=await fetch('/api/refresh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key})});msg.textContent=r.ok?'Stats refreshed. Open the public page to see it.':'Refresh failed.'}
document.getElementById('saveBtn').onclick=save;document.getElementById('refreshBtn').onclick=refreshNow;load();
</script></body></html>
